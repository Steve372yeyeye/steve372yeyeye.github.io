<center><b><font face="宋体" size="5">使用 Package Installer 安装与卸载软件</font></b></center>
<center><font face="宋体" size="3">我们的包管理器可以安装软件，也可以卸载软件。</font></center>
<center><font face="宋体" size="3">您只需要按照下面的方式照做即可。</font></center>
<p></p>
<center><font face="宋体" size="3">要安装软件，首先打开cmd。定位到 Pier 的所在点，输入：</font></center>
<p>
</p>
<center><font face="宋体" color=green size="3">pier install 你要安装的软件包</font></center>
<p>
</p>
<center><font face="宋体"size="3">要卸载软件，同样打开cmd。定位到 Pier 的所在点，输入：</font></center>
<p>
</p>
<center><font face="宋体" color=green size="3">pier remove 你要安装的软件包</font>
